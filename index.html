<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeoPoly Tool v1.3.2 | Compact</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
    
    <style>
        :root { --primary: #1a252f; --accent: #3498db; --success: #27ae60; --bg: #f4f7f6; }
        
        body { margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* PANEL LATERAL DELGADO */
        .sidebar { 
            width: 240px; background: var(--primary); color: #ecf0f1;
            display: flex; flex-direction: column; z-index: 1000; box-shadow: 2px 0 10px rgba(0,0,0,0.3);
        }

        .sidebar-header { padding: 15px; background: #2c3e50; border-bottom: 1px solid #34495e; }
        .sidebar-header h1 { margin: 0; font-size: 1rem; color: #fff; }
        .sidebar-header p { margin: 0; font-size: 0.7rem; opacity: 0.6; }

        .content { flex: 1; overflow-y: auto; padding: 10px; }

        /* Estilo Acordeón / Secciones */
        details { background: #2c3e50; margin-bottom: 8px; border-radius: 4px; overflow: hidden; }
        summary { padding: 10px; font-size: 0.75rem; font-weight: bold; cursor: pointer; background: #34495e; list-style: none; text-transform: uppercase; }
        summary:hover { background: #3d566e; }
        .section-body { padding: 10px; border-top: 1px solid #2c3e50; }

        /* Elementos UI */
        label { display: block; font-size: 0.7rem; margin-bottom: 4px; color: #bdc3c7; }
        input, select, button { 
            width: 100%; padding: 6px; margin-bottom: 8px; border-radius: 3px; 
            border: none; font-size: 0.8rem; box-sizing: border-box; 
        }
        input[type="number"], select { background: #ecf0f1; color: #333; }
        
        button { background: var(--accent); color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #2980b9; }
        
        .btn-export { background: var(--success); margin-top: 10px; padding: 10px; }

        /* MAPA */
        #map { flex: 1; position: relative; }

        /* BARRA DE COORDENADAS FLOTANTE */
        .coords-overlay {
            position: absolute; bottom: 10px; right: 10px; 
            background: rgba(0,0,0,0.7); color: white; padding: 5px 10px;
            border-radius: 4px; font-family: monospace; font-size: 0.75rem; z-index: 1000;
            pointer-events: none;
        }

        /* Ajuste de iconos de Leaflet Geoman para que sean más pequeños */
        .leaflet-pm-toolbar { transform: scale(0.9); transform-origin: top left; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>GeoPoly Tool <small>v1.3.2</small></h1>
            <p>Por Guillermo Diaz</p>
        </div>

        <div class="content">
            <details open>
                <summary>🗺️ Mapa Base</summary>
                <div class="section-body">
                    <select onchange="changeLayer(this.value)">
                        <option value="satelite">Satelital</option>
                        <option value="callejero">Callejero</option>
                    </select>
                </div>
            </details>

            <details>
                <summary>📐 Proyectar Punto C</summary>
                <div class="section-body">
                    <label>Distancia A->C (m)</label>
                    <input type="number" id="distX" value="10" step="0.1">
                    <button onclick="calculatePointC()">CALCULAR C</button>
                    <div id="geom-status" style="font-size: 0.65rem; color: #e74c3c;"></div>
                </div>
            </details>

            <details>
                <summary>🛰️ Emlid RS2 (CSV)</summary>
                <div class="section-body">
                    <input type="file" id="csvFile" accept=".csv" style="font-size: 0.6rem;">
                    <button onclick="importCSV()">CARGAR CSV</button>
                    <div id="csv-info" style="font-size: 0.65rem; color: #bdc3c7;"></div>
                </div>
            </details>

            <button class="btn-export" onclick="exportToKML()">📦 EXPORTAR KML</button>
        </div>
    </aside>

    <main id="map"></main>

    <div class="coords-overlay" id="mouse-coords">
        WGS84: 0.000000, 0.000000
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css"></script>
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>
    <script src="https://unpkg.com/tokml/tokml.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

    <script>
        const baseLayers = {
            satelite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'),
            callejero: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
        };

        const map = L.map('map', { center: [-32.95, -60.75], zoom: 15, layers: [baseLayers.satelite], zoomControl: false });
        L.control.zoom({ position: 'bottomleft' }).addTo(map);

        const drawnItems = new L.FeatureGroup().addTo(map);
        const emlidLayer = new L.FeatureGroup().addTo(map);

        map.pm.addControls({ position: 'topleft', drawMarker: true, drawPolygon: true, removalMode: true, drawCircle: false, drawPolyline: false, cutLayer: false });

        function changeLayer(v) { 
            Object.values(baseLayers).forEach(l => map.removeLayer(l));
            baseLayers[v].addTo(map); 
        }

        function importCSV() {
            const fileInput = document.getElementById('csvFile');
            if (!fileInput.files[0]) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const lines = e.target.result.split('\n');
                const headers = lines[0].toLowerCase().split(',');
                const idx = { lat: headers.indexOf('latitude'), lng: headers.indexOf('longitude'), name: headers.indexOf('name'), sol: headers.indexOf('solution status') };
                let count = 0;
                lines.slice(1).forEach(line => {
                    const col = line.split(','); if (col.length < 3) return;
                    const lat = parseFloat(col[idx.lat]), lng = parseFloat(col[idx.lng]);
                    const status = col[idx.sol]?.trim().toLowerCase() || '';
                    const color = status.includes('fix') ? '#2ecc71' : '#e74c3c';
                    if (!isNaN(lat)) {
                        L.circleMarker([lat, lng], { radius: 4, fillColor: color, color: "#fff", weight: 1, fillOpacity: 1 }).addTo(emlidLayer)
                        .bindPopup(`Pt: ${col[idx.name]} [${status.toUpperCase()}]`);
                        count++;
                    }
                });
                if(count > 0) map.fitBounds(emlidLayer.getBounds());
                document.getElementById('csv-info').innerText = `${count} puntos cargados.`;
            };
            reader.readAsText(fileInput.files[0]);
        }

        function calculatePointC() {
            const markers = [];
            map.eachLayer(l => { if (l instanceof L.Marker && l.options.icon.options.className !== 'custom-icon') markers.push(l); });
            if (markers.length < 2) { document.getElementById('geom-status').innerText = "Coloque A y B primero."; return; }
            
            const pA = markers[markers.length - 2].getLatLng();
            const pB = markers[markers.length - 1].getLatLng();
            const dist = parseFloat(document.getElementById('distX').value);

            const bearing = turf.bearing(turf.point([pA.lng, pA.lat]), turf.point([pB.lng, pB.lat]));
            const dest = turf.destination(turf.point([pA.lng, pA.lat]), dist / 1000, bearing, {units: 'kilometers'});

            L.circleMarker([dest.geometry.coordinates[1], dest.geometry.coordinates[0]], {
                radius: 6, fillColor: 'orange', color: 'black', weight: 2, fillOpacity: 1
            }).addTo(drawnItems).bindPopup(`Punto C: ${dist}m de A`).openPopup();
            document.getElementById('geom-status').innerText = "OK";
        }

        function exportToKML() {
            const temp = new L.FeatureGroup([drawnItems, emlidLayer]);
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([tokml(temp.toGeoJSON())], { type: 'application/vnd.google-earth.kml+xml' }));
            a.download = 'GeoPoly_v132.kml'; a.click();
        }

        map.on('mousemove', (e) => {
            document.getElementById('mouse-coords').innerText = `WGS84: ${e.latlng.lat.toFixed(6)}, ${e.latlng.lng.toFixed(6)}`;
        });
    </script>
</body>
</html>
