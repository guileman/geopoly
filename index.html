<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeoPoly Tool v1.4 | Selector Interactivo</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
    
    <style>
        :root { --primary: #1a252f; --accent: #3498db; --success: #27ae60; --selection: #f39c12; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 240px; background: var(--primary); color: #ecf0f1; display: flex; flex-direction: column; z-index: 1000; }
        .sidebar-header { padding: 15px; background: #2c3e50; border-bottom: 1px solid #34495e; }
        .sidebar-header h1 { margin: 0; font-size: 1rem; }

        .content { flex: 1; overflow-y: auto; padding: 10px; }
        details { background: #2c3e50; margin-bottom: 8px; border-radius: 4px; }
        summary { padding: 10px; font-size: 0.75rem; font-weight: bold; cursor: pointer; background: #34495e; }
        .section-body { padding: 10px; }

        input, select, button { width: 100%; padding: 8px; margin-bottom: 8px; border-radius: 3px; border: none; font-size: 0.8rem; box-sizing: border-box; }
        button { background: var(--accent); color: white; cursor: pointer; font-weight: bold; }
        
        /* Estilos específicos para selección */
        .btn-select { background: #7f8c8d; font-size: 0.7rem; }
        .btn-select.active { background: var(--selection); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .point-label { font-size: 0.7rem; color: #bdc3c7; margin-bottom: 10px; display: block; background: #1a252f; padding: 5px; border-radius: 3px; min-height: 15px; }
        
        #map { flex: 1; position: relative; }
        .coords-overlay { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; padding: 5px 10px; border-radius: 4px; font-size: 0.75rem; z-index: 1000; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>GeoPoly Tool <small>v1.4</small></h1>
        </div>

        <div class="content">
            <details open>
                <summary>📐 Proyectar Punto C</summary>
                <div class="section-body">
                    <button id="btnA" class="btn-select" onclick="startSelection('A')">SELECCIONAR PUNTO A</button>
                    <span id="labelA" class="point-label">A: No seleccionado</span>
                    
                    <button id="btnB" class="btn-select" onclick="startSelection('B')">SELECCIONAR PUNTO B</button>
                    <span id="labelB" class="point-label">B: No seleccionado</span>

                    <label style="font-size: 0.7rem;">Distancia A->C (m)</label>
                    <input type="number" id="distX" value="10" step="0.1">
                    
                    <button style="background: var(--success);" onclick="calculatePointC()">GENERAR PUNTO C</button>
                </div>
            </details>

            <details>
                <summary>🛰️ Emlid RS2 (CSV)</summary>
                <div class="section-body">
                    <input type="file" id="csvFile" accept=".csv">
                    <button onclick="importCSV()">CARGAR CSV</button>
                </div>
            </details>

            <button style="margin-top:20px; background:#e67e22;" onclick="exportToKML()">📦 EXPORTAR KML</button>
        </div>
    </aside>

    <main id="map"></main>
    <div class="coords-overlay" id="mouse-coords">WGS84: 0.000, 0.000</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>
    <script src="https://unpkg.com/tokml/tokml.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

    <script>
        const map = L.map('map', { center: [-32.95, -60.75], zoom: 15, zoomControl: false });
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
        
        const drawnItems = new L.FeatureGroup().addTo(map);
        const emlidLayer = new L.FeatureGroup().addTo(map);

        map.pm.addControls({ position: 'topleft', drawMarker: true, drawPolygon: true, removalMode: true });

        // Variables de estado para la selección
        let selectingFor = null;
        let pointA = null;
        let pointB = null;

        function startSelection(target) {
            selectingFor = target;
            document.getElementById('btnA').classList.remove('active');
            document.getElementById('btnB').classList.remove('active');
            document.getElementById('btn' + target).classList.add('active');
            document.getElementById('map').style.cursor = 'crosshair';
        }

        // Manejador de clics en el mapa y elementos
        map.on('click', function(e) {
            if (!selectingFor) return;
            // Si el usuario hace clic en el mapa vacío, no hacemos nada o avisamos
            alert("Por favor, haz clic directamente sobre un punto existente (CSV o marcador).");
        });

        // Función para asignar el punto seleccionado
        function assignPoint(latlng, name) {
            if (selectingFor === 'A') {
                pointA = latlng;
                document.getElementById('labelA').innerText = `A: ${name || 'Punto Seleccionado'}`;
            } else if (selectingFor === 'B') {
                pointB = latlng;
                document.getElementById('labelB').innerText = `B: ${name || 'Punto Seleccionado'}`;
            }
            
            document.getElementById('btn' + selectingFor).classList.remove('active');
            selectingFor = null;
            document.getElementById('map').style.cursor = '';
        }

        // Modificamos la creación de elementos para que sean "seleccionables"
        function makeSelectable(layer, name) {
            layer.on('click', function(e) {
                if (selectingFor) {
                    L.DomEvent.stopPropagation(e); // Evita que el clic pase al mapa
                    assignPoint(e.target.getLatLng(), name);
                }
            });
        }

        map.on('pm:create', (e) => {
            drawnItems.addLayer(e.layer);
            makeSelectable(e.layer, "Dibujo " + e.shape);
        });

        function importCSV() {
            const fileInput = document.getElementById('csvFile');
            if (!fileInput.files[0]) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const lines = e.target.result.split('\n');
                const headers = lines[0].toLowerCase().split(',');
                const idx = { lat: headers.indexOf('latitude'), lng: headers.indexOf('longitude'), name: headers.indexOf('name') };
                
                lines.slice(1).forEach(line => {
                    const col = line.split(',');
                    if (col.length < 3) return;
                    const lat = parseFloat(col[idx.lat]), lng = parseFloat(col[idx.lng]);
                    const pName = col[idx.name] || 'Punto CSV';
                    if (!isNaN(lat)) {
                        const m = L.circleMarker([lat, lng], { radius: 5, fillColor: '#2ecc71', color: '#fff', weight: 1, fillOpacity: 1 }).addTo(emlidLayer);
                        m.bindPopup("Pt: " + pName);
                        makeSelectable(m, pName); // HACER SELECCIONABLE
                    }
                });
                map.fitBounds(emlidLayer.getBounds());
            };
            reader.readAsText(fileInput.files[0]);
        }

        function calculatePointC() {
            if (!pointA || !pointB) return alert("Debes seleccionar primero el Punto A y el Punto B.");
            
            const dist = parseFloat(document.getElementById('distX').value);
            const ptA = turf.point([pointA.lng, pointA.lat]);
            const ptB = turf.point([pointB.lng, pointB.lat]);
            
            const bearing = turf.bearing(ptA, ptB);
            const dest = turf.destination(ptA, dist / 1000, bearing, {units: 'kilometers'});

            const pC = L.circleMarker([dest.geometry.coordinates[1], dest.geometry.coordinates[0]], {
                radius: 6, fillColor: '#f39c12', color: '#fff', weight: 2, fillOpacity: 1
            }).addTo(drawnItems);
            
            pC.bindPopup(`Punto C: ${dist}m de A en línea con B`).openPopup();
        }

        function exportToKML() {
            const temp = new L.FeatureGroup([drawnItems, emlidLayer]);
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([tokml(temp.toGeoJSON())], { type: 'application/vnd.google-earth.kml+xml' }));
            a.download = 'Relevamiento_GeoPoly.kml'; a.click();
        }

        map.on('mousemove', (e) => {
            document.getElementById('mouse-coords').innerText = `WGS84: ${e.latlng.lat.toFixed(6)}, ${e.latlng.lng.toFixed(6)}`;
        });
    </script>
</body>
</html>
