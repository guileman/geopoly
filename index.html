<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GeoPoly Tool v1.9 | POSGAR 07 Precision</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #1a252f; --accent: #3498db; --success: #27ae60; --selection: #f39c12; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
        
        /* Sidebar Estilizada y Compacta */
        .sidebar { width: 260px; background: var(--primary); color: white; display: flex; flex-direction: column; z-index: 1000; box-shadow: 2px 0 10px rgba(0,0,0,0.3); }
        .sidebar-header { padding: 15px; background: #2c3e50; border-bottom: 1px solid #34495e; text-align: center; }
        .sidebar-header h1 { margin: 0; font-size: 1rem; }
        .sidebar-header p { margin: 0; font-size: 0.6rem; opacity: 0.6; }

        .content { flex: 1; overflow-y: auto; padding: 10px; }
        
        details { background: #2c3e50; margin-bottom: 8px; border-radius: 4px; border: 1px solid #34495e; }
        summary { padding: 8px; font-size: 0.7rem; font-weight: bold; cursor: pointer; background: #34495e; text-transform: uppercase; list-style: none; }
        summary:hover { background: #3d566e; }
        .section-body { padding: 10px; }
        
        label { display: block; font-size: 0.65rem; margin-bottom: 4px; color: #95a5a6; }
        input, select, button { width: 100%; padding: 8px; margin-bottom: 8px; border-radius: 3px; border: none; font-size: 0.8rem; box-sizing: border-box; }
        
        button { background: var(--accent); color: white; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { opacity: 0.9; }
        
        /* Estilos específicos para selección A-B */
        .btn-select.active { background: var(--selection); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        
        .point-confirm-label { font-size: 0.7rem; color: #bdc3c7; background: #1a252f; padding: 5px; border-radius: 3px; margin-top: -5px; margin-bottom: 10px; min-height: 15px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Estilo de Etiquetas en Mapa - SUTIL SIN RECUADRO */
        .point-label-subtle {
            color: white;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            text-shadow: 1px 1px 0 #000, -1px 1px 0 #000, 1px -1px 0 #000, -1px -1px 0 #000; /* Borde de texto para legibilidad */
            white-space: nowrap;
        }

        #map { flex: 1; position: relative; }
        .coords-overlay { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.8); color: white; padding: 8px; border-radius: 4px; font-family: monospace; font-size: 0.7rem; z-index: 1000; line-height: 1.4; pointer-events: none; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>GeoPoly Tool <small>v1.9</small></h1>
            <p>Por Guillermo Diaz</p>
        </div>
        
        <div class="content">
            <details open>
                <summary>🌐 Proyección POSGAR 2007</summary>
                <div class="section-body">
                    <label>Selector de Faja Gauss-Krüger:</label>
                    <select id="fajaSelector" onchange="updateProjection()">
                        <option value="1">Faja 1 (Meridiano -72°)</option>
                        <option value="2">Faja 2 (Meridiano -69°)</option>
                        <option value="3">Faja 3 (Meridiano -66°)</option>
                        <option value="4" selected>Faja 4 (Meridiano -63°)</option>
                        <option value="5">Faja 5 (Meridiano -60°)</option>
                        <option value="6">Faja 6 (Meridiano -57°)</option>
                        <option value="7">Faja 7 (Meridiano -54°)</option>
                    </select>
                </div>
            </details>

            <details open>
                <summary>📐 Geometría de Campo</summary>
                <div class="section-body">
                    <button id="btnA" class="btn-select" onclick="startSelection('A')">DESIGNAR PUNTO A</button>
                    <span id="labelA" class="point-confirm-label">A: No seleccionado</span>
                    
                    <button id="btnB" class="btn-select" onclick="startSelection('B')">DESIGNAR PUNTO B</button>
                    <span id="labelB" class="point-confirm-label">B: No seleccionado</span>
                    
                    <label>Distancia a proyectar desde A (m):</label>
                    <input type="number" id="distX" value="10.000" step="0.001">
                    <button style="background: var(--success);" onclick="calculatePointC()">GENERAR PUNTO C</button>
                </div>
            </details>

            <details>
                <summary>📂 Archivos (Emlid Flow CSV)</summary>
                <div class="section-body">
                    <input type="file" id="csvFile" accept=".csv">
                    <button onclick="importCSV()">CARGAR PUNTOS RS2</button>
                </div>
            </details>

            <div style="padding: 10px; border-top: 1px solid #34495e;">
                <button style="background: #9b59b6; margin-bottom: 5px;" onclick="exportToCSV()">💾 EXPORTAR CSV (RS2)</button>
                <button style="background: #e67e22;" onclick="exportToKML()">📦 EXPORTAR KML (Todo)</button>
            </div>
        </div>
    </aside>

    <main id="map"></main>
    
    <div class="coords-overlay" id="mouse-coords">
        WGS84: -, -<br>
        <span id="posgar-live" style="color: #3498db;">POSGAR: -</span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/tokml/tokml.js"></script>

    <script>
        // --- INICIALIZACIÓN DE PROYECCIÓN ---
        let currentFajaDef = "";
        const wgs84 = "EPSG:4326";

        function updateProjection() {
            const faja = document.getElementById('fajaSelector').value;
            const meridiano = -72 + (faja - 1) * 3;
            const falsoEste = faja * 1000000 + 500000;
            
            // Definición oficial POSGAR 2007 para la faja seleccionada
            currentFajaDef = `+proj=tmerc +lat_0=-90 +lon_0=${meridiano} +k=1 +x_0=${falsoEste} +y_0=0 +ellps=WGS84 +units=m +no_defs`;
        }
        updateProjection(); // Inicializar faja por defecto

        // --- INICIALIZACIÓN DEL MAPA CON MÁS ZOOM (MAX 21) ---
        const map = L.map('map', { center: [-32.95, -60.75], zoom: 17, zoomControl: false, maxZoom: 21 });
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 21, // Permitir zoom extra para precisión
            attribution: 'Tiles &copy; Esri'
        }).addTo(map);
        
        const emlidLayer = new L.FeatureGroup().addTo(map);
        const drawnItems = new L.FeatureGroup().addTo(map);
        const labelLayer = new L.LayerGroup().addTo(map); // Capa para etiquetas sutiles

        let selectingFor = null, objA = null, objB = null;

        // --- FUNCIONES DE ETIQUETA SUTIL ---
        function createSubtleLabel(latlng, text) {
            const labelIcon = L.divIcon({
                className: 'custom-subtle-label',
                html: `<div class="point-label-subtle">${text}</div>`,
                iconSize: [120, 20],
                iconAnchor: [60, -8] // Desplazamiento hacia abajo del punto
            });
            return L.marker(latlng, { icon: labelIcon, interactive: false }).addTo(labelLayer);
        }

        // --- LÓGICA DE SELECCIÓN DE PUNTOS INTERACTIVA ---
        function startSelection(target) {
            selectingFor = target;
            document.querySelectorAll('.btn-select').forEach(b => b.classList.remove('active'));
            document.getElementById('btn' + target).classList.add('active');
        }

        function assignPoint(layer, name) {
            if (selectingFor === 'A') {
                objA = layer;
                document.getElementById('labelA').innerText = `A: ${name}`;
            } else {
                objB = layer;
                document.getElementById('labelB').innerText = `B: ${name}`;
            }
            document.getElementById('btn' + selectingFor).classList.remove('active');
            selectingFor = null;
        }

        function makeSelectable(layer, name) {
            layer.on('click', (e) => { 
                if (selectingFor) { 
                    L.DomEvent.stopPropagation(e); // Evitar que el clic pase al mapa
                    assignPoint(e.target, name); 
                } 
            });
        }

        // --- CÁLCULO DE PRECISIÓN POSGAR DEL PUNTO C ---
        function calculatePointC() {
            if (!objA || !objB) return alert("Designa puntos A y B primero.");
            const pA = objA.getLatLng(), pB = objB.getLatLng();
            const distC = parseFloat(document.getElementById('distX').value);

            // Transformar a plano POSGAR de la faja seleccionada
            const posA = proj4(wgs84, currentFajaDef, [pA.lng, pA.lat]);
            const posB = proj4(wgs84, currentFajaDef, [pB.lng, pB.lat]);

            // Vector AB en metros planos
            const dx = posB[0] - posA[0], dy = posB[1] - posA[1];
            const distAB = Math.sqrt(dx*dx + dy*dy);
            
            // Proyección lineal de C
            const posC = [posA[0] + (dx/distAB)*distC, posA[1] + (dy/distAB)*distC];

            // Transformar de vuelta a geográficas WGS84 para el mapa web
            const wgsC = proj4(currentFajaDef, wgs84, posC);
            const latlngC = [wgsC[1], wgsC[0]];
            const nameC = `C_${distC}m_de_A`;

            // Crear Punto C en mapa
            const pC = L.circleMarker(latlngC, { radius: 6, fillColor: '#f39c12', color: '#fff', weight: 2, fillOpacity: 1 }).addTo(drawnItems);
            pC.options.name = nameC;
            pC.options.elevation = ((objA.options.elevation || 0) + (objB.options.elevation || 0)) / 2; // Interpolación básica de altura
            
            createSubtleLabel(latlngC, nameC);
            makeSelectable(pC, nameC);
        }

        // --- IMPORTACIÓN / EXPORTACIÓN DE ARCHIVOS CSV EMLID FLOW ---
        function importCSV() {
            const fileInput = document.getElementById('csvFile');
            if (!fileInput.files[0]) return alert("Selecciona un archivo CSV.");
            const reader = new FileReader();
            reader.onload = function(e) {
                const lines = e.target.result.split('\n');
                const h = lines[0].toLowerCase().split(',');
                const idx = { name: h.indexOf('name'), lng: h.indexOf('longitude'), lat: h.indexOf('latitude'), alt: h.indexOf('ellipsoidal height') };
                
                lines.slice(1).forEach(line => {
                    const c = line.split(','); if (c.length < 3) return;
                    const lat = parseFloat(c[idx.lat]), lng = parseFloat(c[idx.lng]);
                    const name = (c[idx.name] || "Pt_Unk").trim();
                    if (!isNaN(lat)) {
                        const m = L.circleMarker([lat, lng], { radius: 5, fillColor: '#2ecc71', color: '#fff', weight: 1, fillOpacity: 1 }).addTo(emlidLayer);
                        m.options.name = name;
                        m.options.elevation = parseFloat(c[idx.alt]) || 0;
                        createSubtleLabel([lat, lng], name);
                        makeSelectable(m, name);
                    }
                });
                if(emlidLayer.getLayers().length > 0) map.fitBounds(emlidLayer.getBounds());
            };
            reader.readAsText(fileInput.files[0]);
        }

        function exportToCSV() {
            // FORMATO REQUERIDO POR EMLID: Name, Longitude, Latitude, Ellipsoidal height
            let csv = ["Name,Longitude,Latitude,Ellipsoidal height"];
            [drawnItems, emlidLayer].forEach(g => g.eachLayer(l => {
                if (l.getLatLng && l.options.name) {
                    csv.push(`${l.options.name},${l.getLatLng().lng.toFixed(8)},${l.getLatLng().lat.toFixed(8)},${(l.options.elevation || 0).toFixed(3)}`);
                }
            }));
            const blob = new Blob([csv.join("\n")], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `GeoPoly_Faja${document.getElementById('fajaSelector').value}_${new Date().getTime()}.csv`;
            a.click();
        }

        function exportToKML() {
            const temp = new L.FeatureGroup([drawnItems, emlidLayer]);
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([tokml(temp.toGeoJSON())], { type: 'application/vnd.google-earth.kml+xml' }));
            a.download = 'GeoPoly_KML.kml'; a.click();
        }

        // --- EVENTOS DE RATÓN: COORDENADAS EN TIEMPO REAL ---
        map.on('mousemove', (e) => {
            const p = proj4(wgs84, currentFajaDef, [e.latlng.lng, e.latlng.lat]);
            const faja = document.getElementById('fajaSelector').value;
            document.getElementById('mouse-coords').innerHTML = 
                `WGS84: ${e.latlng.lat.toFixed(6)}, ${e.latlng.lng.toFixed(6)}<br>` +
                `<span style="color: #3498db;">POSGAR F${faja}: X=${p[0].toFixed(3)} Y=${p[1].toFixed(3)}</span>`;
        });
    </script>
</body>
</html>
